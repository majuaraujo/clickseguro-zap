<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>ClickSeguro</title>
  </head>
  <body>
    <h1>ClickSeguro</h1>
    <h2>Login</h2>

    <!-- Vulnerabilidade proposital: formulário sem validação de entrada -->
    <form action="/login" method="GET">
      <label>Usuário:</label>
      <input type="text" name="usuario" />

      <br /><br />

      <label>Senha:</label>
      <input type="password" name="senha" />

      <br /><br />

      <button type="submit">Entrar</button>
    </form>

    <!-- Vulnerabilidade proposital: uso de script inline -->
    <script>
      const params = new URLSearchParams(window.location.search);
      document.write("Usuário informado: " + params.get("usuario"));
    </script>
  </body>
</html>
