name: OWASP ZAP Security Scan

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Iniciar aplicação local
        run: |
          python3 -m http.server 8080 &
          sleep 10

      - name: Rodar OWASP ZAP
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://127.0.0.1:8080"
          fail_action: false
          artifact_name: zap-report
          cmd_options: "-a -r zap_report.html -w zap_report.md -J zap_report.json"

      - name: Verificar arquivos gerados
        if: always()
        run: |
          echo "Arquivos encontrados:"
          find . -name "zap_report*" -type f
          ls -la

      - name: Salvar relatório como Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            **/zap_report.html
            **/zap_report.md
            **/zap_report.json
