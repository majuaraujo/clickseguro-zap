name: OWASP ZAP Security Scan

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Iniciar aplicação local
        run: |
          python3 -m http.server 8080 > server.log 2>&1 &
          sleep 5

      - name: Criar pasta do relatório
        run: mkdir -p zap-report

      - name: Rodar OWASP ZAP
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/zap-report:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:8080 \
            -r zap_report.html \
            -J zap_report.json \
            -w zap_report.md || true

      - name: Publicar relatório como Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: zap-report
